# Upbit Exchange Configuration
# Auth: JWT (HS256) with SHA512 query hash
# Symbol format: KRW-BTC (quote-base with dash)
# Kline: separate endpoints for minutes/days/weeks/months
id: upbit
display_name: Upbit
venue_type: cex
website: https://upbit.com
api_doc: https://global-docs.upbit.com/reference/rest-api-guide

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: jwt_hs256
  header_name: Authorization
  header_format: "Bearer {token}"

kline_periods:
  1m: "1"
  3m: "3"
  5m: "5"
  10m: "10"
  15m: "15"
  30m: "30"
  1h: "60"
  2h: "120"
  4h: "240"
  6h: "360"
  8h: "480"
  12h: "720"
  1d: "D"
  3d: "3D"
  1w: "W"
  1M: "M"

legal_currency: [KRW, USDT, BTC, ETH]

rate_limits:
  - name: public_request
    type: sliding_window
    interval: 60
    limit: 900
    scope: global
  - name: private_request
    type: sliding_window
    interval: 60
    limit: 30
    scope: global
  - name: order_request
    type: sliding_window
    interval: 1
    limit: 8
    scope: global
  - name: quotation
    type: sliding_window
    interval: 60
    limit: 1800
    scope: global

asset_types:
  spot:
    exchange_name: UPBIT___SPOT
    rest_url: "https://api.upbit.com"
    wss_url: "wss://api.upbit.com/websocket/v1"
    symbol_format: "{quote}-{base}"
    legal_currency: [KRW, USDT, BTC, ETH]
    rest_paths:
      # Market Data (public)
      get_exchange_info: "GET /v1/market/all"
      get_tick: "GET /v1/ticker"
      get_depth: "GET /v1/orderbook"
      get_trades: "GET /v1/trades/ticks"
      get_kline_minutes: "GET /v1/candles/minutes/{unit}"
      get_kline_days: "GET /v1/candles/days"
      get_kline_weeks: "GET /v1/candles/weeks"
      get_kline_months: "GET /v1/candles/months"
      # Account (signed)
      get_account: "GET /v1/accounts"
      get_balance: "GET /v1/accounts"
      # Trading (signed)
      make_order: "POST /v1/orders"
      cancel_order: "DELETE /v1/order"
      query_order: "GET /v1/order"
      get_open_orders: "GET /v1/orders"
      # Utility (signed)
      get_api_keys: "GET /v1/api_keys"
      get_wallet_status: "GET /v1/status/wallet"
    wss_paths:
      ticker: '{"type": "ticker", "codes": ["{market}"]}'
      trade: '{"type": "trade", "codes": ["{market}"]}'
      orderbook: '{"type": "orderbook", "codes": ["{market}"]}'
    kline_periods:
      1m: "1"
      3m: "3"
      5m: "5"
      10m: "10"
      15m: "15"
      30m: "30"
      1h: "60"
      2h: "120"
      4h: "240"
      6h: "360"
      8h: "480"
      12h: "720"
      1d: "D"
      3d: "3D"
      1w: "W"
      1M: "M"
